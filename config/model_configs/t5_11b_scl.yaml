model_name: "t5-11b"
model_type: "encoder-decoder"
projection_dim: 256
temperature: 0.07
max_length: 256
use_bf16: true
use_fp16: true

pretrain:
  batch_size_per_class: 2
  n_classes_per_batch: 6
  learning_rate: 2e-5
  epochs: 50
  gradient_accumulation_steps: 8
  weight_decay: 0.0

finetune:
  batch_size: 1
  learning_rate: 1e-4
  epochs: 10
  gradient_accumulation_steps: 8
  freeze_layers: 6  # Freeze all but last 6 encoder blocks
  weight_decay: 0.01
  use_bf16: true
  optim: "adafactor"
