seed: 42
val_split: 0.1
weight_decay: 0.01
save_total_limit: 2
logging_steps: 50
metric_for_best_model: "accuracy"

reasoning_type: "step_by_step"
reasoning_column: "step_by_step_reasoning"
max_generation_length: 1024

train_prompt: "classify: the following post and explain your step by step reasoning: {text}"
test_prompt: "classify: the following post and explain your reasoning: {text}"
target_format: "{label}. Step by step reasoning: {reasoning}"

labels:
  - "Medical Use"
  - "Misuse"
  - "Addiction"
  - "Recovery"
  - "Relapse"
  - "Not Using"
